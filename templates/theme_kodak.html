<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Cam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* === CAMERA BODY === */
        .camera {
            width: 100vw;
            height: 100dvh;
            max-width: 430px;
            background: #1a1a1a;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Kodak yellow curve - the big swoosh */
        .curve-yellow {
            position: absolute;
            top: -55%;
            right: -30%;
            width: 140%;
            height: 90%;
            background: #fdd835;
            border-radius: 0 0 50% 50%;
            z-index: 1;
        }

        /* Red accent curve */
        .curve-red {
            position: absolute;
            top: -57%;
            right: -32%;
            width: 142%;
            height: 90%;
            background: #d32f2f;
            border-radius: 0 0 50% 50%;
            z-index: 0;
        }

        /* Bottom yellow curve */
        .curve-yellow-bottom {
            position: absolute;
            bottom: -55%;
            left: -30%;
            width: 140%;
            height: 90%;
            background: #fdd835;
            border-radius: 50% 50% 0 0;
            z-index: 1;
        }

        /* Bottom red accent curve */
        .curve-red-bottom {
            position: absolute;
            bottom: -57%;
            left: -32%;
            width: 142%;
            height: 90%;
            background: #d32f2f;
            border-radius: 50% 50% 0 0;
            z-index: 0;
        }

        /* === TOP AREA === */
        .top-bar {
            position: relative;
            z-index: 5;
            padding: 16px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .brand-sub {
            font-size: 11px;
            font-weight: 600;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        .film-counter {
            background: #111;
            border: 3px solid #333;
            border-radius: 8px;
            width: 56px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .film-num {
            font-family: 'Fredoka', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #fdd835;
            text-shadow: 0 0 8px rgba(253, 216, 53, 0.4);
        }

        /* Flash window */
        .flash-window {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #e0e0e0, #fff, #e0e0e0);
            border-radius: 4px;
            border: 2px solid #444;
            z-index: 6;
            box-shadow: inset 0 0 6px rgba(255,255,255,0.5);
        }

        /* === VIEWFINDER AREA === */
        .viewfinder-section {
            position: relative;
            z-index: 5;
            padding: 20px;
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .viewfinder {
            width: 80px;
            height: 54px;
            border: 3px solid #333;
            border-radius: 6px;
            background: linear-gradient(135deg, #1a3a5c, #0d1f33);
            box-shadow:
                inset 0 2px 6px rgba(0,0,0,0.6),
                0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .viewfinder::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 6px;
            width: 14px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: rotate(-15deg);
        }

        /* === MAIN CONTENT === */
        .content {
            flex: 1;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px 10px;
        }

        /* Photo preview */
        .preview-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid #fdd835;
            display: none;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .cam-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 6px;
        }

        .cam-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-bottom: 16px;
        }

        .table-tag {
            display: inline-block;
            background: #fdd835;
            color: #1a1a1a;
            font-family: 'Fredoka', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 5px 18px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        /* Name input */
        .name-field {
            width: 100%;
            max-width: 300px;
        }

        .name-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: block;
        }

        .name-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            padding: 12px 16px;
            outline: none;
            text-align: center;
        }

        .name-input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .name-input:focus {
            border-color: #fdd835;
        }

        /* === UPLOAD STATES === */
        .upload-state {
            display: none;
            width: 100%;
            text-align: center;
        }

        .upload-state.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .developing-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: #fdd835;
            animation: blink 1.2s infinite;
        }

        .progress-bar {
            width: 70%;
            max-width: 260px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fdd835, #d32f2f);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Success */
        .success-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fdd835;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .success-icon svg {
            width: 28px;
            height: 28px;
        }

        .success-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .success-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .another-btn {
            background: #fff;
            border: 2px solid #fff;
            color: #1a1a1a;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 16px;
        }

        .another-btn:active {
            background: rgba(253, 216, 53, 0.15);
        }

        .error-text {
            font-size: 18px;
            font-weight: 600;
            color: #ff6b6b;
        }

        /* === BOTTOM — SHUTTER === */
        .bottom-area {
            position: relative;
            z-index: 5;
            padding: 12px 20px 32px;
        }

        .shutter-row {
            display: flex;
            gap: 10px;
        }

        .shutter-btn {
            flex: 1;
            height: 62px;
            border: none;
            border-radius: 14px;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .shutter-btn:active:not(:disabled) {
            transform: translateY(3px);
        }

        .shutter-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-snap {
            background: #d32f2f;
            color: #fff;
            box-shadow:
                0 5px 0 #9a1c1c,
                0 8px 20px rgba(0,0,0,0.4);
        }

        .btn-snap:active:not(:disabled) {
            box-shadow:
                0 2px 0 #9a1c1c,
                0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-gallery {
            background: linear-gradient(180deg, #333, #222);
            color: #fff;
            box-shadow:
                0 5px 0 #111,
                0 8px 20px rgba(0,0,0,0.4);
            border: 2px solid #555;
            flex: 0.6;
            font-size: 16px;
        }

        .btn-gallery:active:not(:disabled) {
            box-shadow:
                0 2px 0 #c6a700,
                0 4px 10px rgba(0,0,0,0.4);
        }

        /* Kodak stripe at very bottom */
        .kodak-stripe {
            display: flex;
            height: 4px;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .kodak-stripe span:nth-child(1) { flex: 1; background: #d32f2f; }
        .kodak-stripe span:nth-child(2) { flex: 1; background: #fdd835; }
        .kodak-stripe span:nth-child(3) { flex: 1; background: #d32f2f; }

        /* Hidden inputs */
        input[type="file"] { display: none; }

        /* Flash animation */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.1s;
        }
        .flash-overlay.fire {
            opacity: 0.85;
            transition: opacity 0.05s;
        }
    </style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="camera">
    <div class="curve-red"></div>
    <div class="curve-yellow"></div>
    <div class="curve-red-bottom"></div>
    <div class="curve-yellow-bottom"></div>
    <div class="kodak-stripe"><span></span><span></span><span></span></div>

    <!-- Top -->
    <div class="top-bar">
        <div class="brand">
            <div class="brand-name">WedSnap</div>
            <div class="brand-sub">Single Use</div>
        </div>
        <div class="flash-window"></div>
        <div class="film-counter">
            <span class="film-num" id="shotCounter">--</span>
        </div>
    </div>

    <!-- Viewfinder -->
    <div class="viewfinder-section">
        <div class="viewfinder"></div>
    </div>

    <!-- Main content -->
    <div class="content">
        <img class="preview-img" id="previewImg" src="" alt="preview">

        <!-- Ready -->
        <div class="upload-state active" id="stateReady">
            <div class="cam-title">Snap a Memory!</div>
            <div class="cam-subtitle">capture this moment forever</div>
            {% if table %}
            <div class="table-tag">Table {{ table }}</div>
            {% endif %}
            <div class="name-field">
                <label class="name-label">Your name (optional)</label>
                <input type="text" class="name-input" id="guestName"
                       placeholder="Anonymous" maxlength="30" autocomplete="off">
            </div>
        </div>

        <!-- Uploading -->
        <div class="upload-state" id="stateUploading">
            <div class="developing-text">Developing...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Success -->
        <div class="upload-state" id="stateSuccess">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="success-text">Photo Saved!</div>
            <div class="success-sub">Thanks for the memory</div>
            <button class="another-btn" onclick="resetState()">Take Another</button>
        </div>

        <!-- Error -->
        <div class="upload-state" id="stateError">
            <div class="error-text" id="errorMsg">Something went wrong</div>
            <button class="another-btn" onclick="resetState()">Try Again</button>
        </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-area">
        <div class="shutter-row">
            <button class="shutter-btn btn-snap" id="btnCapture" onclick="capturePhoto()">
                &#128248; SNAP!
            </button>
            <button class="shutter-btn btn-gallery" id="btnGallery" onclick="pickFromGallery()">
                &#128444; Upload
            </button>
        </div>
    </div>

    <input type="file" id="fileCapture" accept="image/*" capture="environment">
    <input type="file" id="filePick" accept="image/*" multiple>
</div>

<script>
    const table = "{{ table }}";

    function updateShotCounter() {
        fetch('/count').then(r => r.json()).then(data => {
            document.getElementById('shotCounter').textContent =
                String(data.count).padStart(2, ' ');
        }).catch(() => {});
    }
    updateShotCounter();

    function fireFlash() {
        const o = document.getElementById('flashOverlay');
        o.classList.add('fire');
        setTimeout(() => o.classList.remove('fire'), 150);
    }

    function showState(id) {
        document.querySelectorAll('.upload-state').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function resetState() {
        showState('stateReady');
        document.getElementById('btnCapture').disabled = false;
        document.getElementById('btnGallery').disabled = false;
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('previewImg').style.display = 'none';
    }

    function capturePhoto() { document.getElementById('fileCapture').click(); }
    function pickFromGallery() { document.getElementById('filePick').click(); }

    document.getElementById('fileCapture').addEventListener('change', handleSingleFile);
    document.getElementById('filePick').addEventListener('change', handleMultiFile);

    function handleSingleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const preview = document.getElementById('previewImg');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        fireFlash();
        uploadFiles([file]);
        e.target.value = '';
    }

    function handleMultiFile(e) {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const preview = document.getElementById('previewImg');
        preview.src = URL.createObjectURL(files[files.length - 1]);
        preview.style.display = 'block';
        fireFlash();
        uploadFiles(files);
        e.target.value = '';
    }

    async function uploadFiles(files) {
        document.getElementById('btnCapture').disabled = true;
        document.getElementById('btnGallery').disabled = true;
        showState('stateUploading');

        const total = files.length;
        let uploaded = 0;
        let lastThumb = null;
        const guestName = document.getElementById('guestName').value || 'anonymous';

        for (const file of files) {
            try {
                const result = await uploadSingleFile(file, guestName, uploaded, total);
                uploaded++;
                lastThumb = result.thumb;
            } catch (err) {
                document.getElementById('errorMsg').textContent =
                    total > 1 ? `Failed on photo ${uploaded + 1} of ${total}` : 'Upload failed';
                showState('stateError');
                return;
            }
        }

        showState('stateSuccess');
        updateShotCounter();
        if (lastThumb) document.getElementById('previewImg').src = '/thumbs/' + lastThumb;

        const sub = document.querySelector('#stateSuccess .success-sub');
        if (total > 1) {
            sub.textContent = `${total} photos saved! Thanks for the memories`;
        } else {
            sub.textContent = 'Thanks for the memory';
        }
    }

    function uploadSingleFile(file, guestName, index, total) {
        return new Promise((resolve, reject) => {
            const fd = new FormData();
            fd.append('photo', file);
            fd.append('table', table);
            fd.append('guest_name', guestName);

            const xhr = new XMLHttpRequest();
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const filePct = (e.loaded / e.total);
                    const overallPct = Math.round(((index + filePct) / total) * 100);
                    document.getElementById('progressFill').style.width = overallPct + '%';
                }
            });
            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    resolve(JSON.parse(xhr.responseText));
                } else {
                    reject(new Error('Upload failed'));
                }
            });
            xhr.addEventListener('error', () => reject(new Error('Connection lost')));
            xhr.open('POST', '/upload');
            xhr.send(fd);
        });
    }
</script>
</body>
</html>
