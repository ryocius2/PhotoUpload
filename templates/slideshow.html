<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wedding Slideshow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    overflow: hidden;
    font-family: 'Georgia', serif;
    cursor: none;
}
#slideshow {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
#photo {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.8s ease;
}
#photo.visible { opacity: 1; }
#empty {
    color: #555;
    font-size: 1.5rem;
    text-align: center;
    display: none;
}
#controls {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    opacity: 0;
    transition: opacity 0.3s;
}
body:hover #controls,
#controls.show { opacity: 1; }
#counter {
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    font-family: monospace;
}
#delete-btn {
    background: rgba(200,0,0,0.7);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
}
#delete-btn:hover { background: rgba(220,0,0,0.9); }
#prev-btn, #next-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
}
#prev-btn:hover, #next-btn:hover { background: rgba(255,255,255,0.3); }
#pause-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
}
</style>
</head>
<body>
<div id="slideshow">
    <img id="photo" src="" alt="">
    <div id="empty">No photos yet — waiting for uploads...</div>
</div>
<div id="controls">
    <button id="prev-btn">&#9664; Prev</button>
    <button id="pause-btn">Pause</button>
    <button id="next-btn">Next &#9654;</button>
    <button id="delete-btn">Delete</button>
    <span id="counter"></span>
</div>

<script>
let photos = [];
let current = -1;
let interval = 5000;
let autoTimer = null;
let paused = false;

async function fetchPhotos() {
    try {
        const res = await fetch('/photos');
        photos = await res.json();
    } catch(e) {}
}

function showPhoto(index) {
    if (photos.length === 0) {
        document.getElementById('empty').style.display = 'block';
        document.getElementById('photo').style.display = 'none';
        document.getElementById('counter').textContent = '0 / 0';
        return;
    }
    document.getElementById('empty').style.display = 'none';
    document.getElementById('photo').style.display = 'block';

    current = ((index % photos.length) + photos.length) % photos.length;
    const img = document.getElementById('photo');
    img.classList.remove('visible');

    setTimeout(() => {
        img.src = '/photos/' + encodeURIComponent(photos[current]);
        img.onload = () => img.classList.add('visible');
    }, 300);

    document.getElementById('counter').textContent =
        (current + 1) + ' / ' + photos.length;
}

function showNext() { showPhoto(current + 1); }
function showPrev() { showPhoto(current - 1); }

function startAuto() {
    stopAuto();
    autoTimer = setInterval(showNext, interval);
}
function stopAuto() {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
}

async function deleteCurrent() {
    if (photos.length === 0 || current < 0) return;
    const name = photos[current];
    if (!confirm('Delete this photo?')) return;
    try {
        await fetch('/photos/' + encodeURIComponent(name), { method: 'DELETE' });
        photos.splice(current, 1);
        if (current >= photos.length) current = photos.length - 1;
        if (photos.length === 0) current = -1;
        showPhoto(current);
    } catch(e) {}
}

document.getElementById('next-btn').addEventListener('click', (e) => {
    e.stopPropagation(); showNext(); if (!paused) startAuto();
});
document.getElementById('prev-btn').addEventListener('click', (e) => {
    e.stopPropagation(); showPrev(); if (!paused) startAuto();
});
document.getElementById('delete-btn').addEventListener('click', (e) => {
    e.stopPropagation(); deleteCurrent();
});
document.getElementById('pause-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
    if (paused) stopAuto(); else startAuto();
});

// Poll for new photos every 15 seconds
setInterval(fetchPhotos, 15000);

// Initial load
fetchPhotos().then(() => { showNext(); startAuto(); });

// Show cursor + controls on mouse move / touch
let cursorTimeout;
function showControls() {
    document.body.style.cursor = 'default';
    document.getElementById('controls').classList.add('show');
    clearTimeout(cursorTimeout);
    cursorTimeout = setTimeout(() => {
        document.body.style.cursor = 'none';
        document.getElementById('controls').classList.remove('show');
    }, 3000);
}
document.addEventListener('mousemove', showControls);
document.addEventListener('touchstart', showControls);
</script>
</body>
</html>
